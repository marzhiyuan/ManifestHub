name: Update Daily Trending Downloads

on:
  schedule:
    - cron: '0 0 * * *' # Every day at 00:00 UTC
  workflow_dispatch: # Allows manual trigger

jobs:
  update-trending:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run update script
        run: node scripts/update-trending.js
        env:
          TRENDING_API_URL: ${{ secrets.TRENDING_API_URL }}

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add js/trending-data.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update static trending data [skip ci]"
            git push
            echo "Changes pushed successfully."
          else
            echo "No changes in trending data."
          fi
