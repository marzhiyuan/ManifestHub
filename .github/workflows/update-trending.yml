name: Update Daily Trending Downloads

on:
  schedule:
    - cron: '18 16 * * *' # Daily at 10:18 PM local / 16:18 UTC
  workflow_dispatch: # Allows manual trigger

jobs:
  update-trending:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run update script
        env:
          GSHEET_TRENDING_URL: ${{ secrets.GSHEET_TRENDING_URL }}
        run: node scripts/update-trending.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/trending-data.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update trending downloads"
            git push
            echo "Changes pushed successfully."
          else
            echo "No changes in trending data."
          fi
