<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimal Search Test</title>
  <style>
    body { font-family: sans-serif; background: #121212; color: #fff; padding: 20px; max-width: 800px; margin: auto; }
    #status { padding: 15px; background: #1e1e1e; border: 1px solid #333; border-radius: 8px; font-family: monospace; white-space: pre-wrap; margin-bottom: 20px; color: #4ade80;}
    .error { color: #f87171 !important; }
    input { width: 100%; padding: 12px; font-size: 16px; margin-bottom: 15px; border-radius: 6px; border: 1px solid #444; background: #222; color: #fff;}
    input:disabled { opacity: 0.5; cursor: not-allowed; }
    .result { padding: 12px; border: 1px solid #333; border-radius: 6px; margin-bottom: 8px; background: #1a1a1a; }
    .depots { color: #888; font-size: 0.85em; margin-top: 4px;}
  </style>
</head>
<body>

  <h2>Minimal Data Tester</h2>

  <div id="status">Initializing...</div>

  <input type="text" id="searchInput" placeholder="Search for a game (e.g. Cyberpunk)..." disabled />
  <div id="results"></div>

  <script>
    const statusEl = document.getElementById('status');
    const searchInput = document.getElementById('searchInput');
    const resultsEl = document.getElementById('results');

    function log(msg, isError = false) {
      if (isError) {
        statusEl.innerHTML += `\n<span class="error">${msg}</span>`;
      } else {
        statusEl.innerHTML += `\n${msg}`;
      }
    }

    let depotKeys = {};
    let appNames = {};
    let appDepots = {};
    let searchable = [];

    async function loadData() {
      try {
        log("1. Fetching depot keys (using updated filename)...");
        // UPDATED URL HERE
        const depotUrl = "https://raw.githubusercontent.com/fylsdy/ManifestHub/main/depotkeys.json";
        
        const depotRes = await fetch(depotUrl);
        log(`   -> Response: ${depotRes.status} ${depotRes.statusText}`, !depotRes.ok);
        
        if (!depotRes.ok) throw new Error("Depot keys URL is dead or private.");
        
        depotKeys = await depotRes.json();
        log(`   -> Success! Loaded ${Object.keys(depotKeys).length} keys.`);

        log("\n2. Fetching Steam games catalogue...");
        const gamesUrl = "https://raw.githubusercontent.com/jsnli/steamappidlist/master/data/games_appid.json";
        
        const gamesRes = await fetch(gamesUrl);
        log(`   -> Response: ${gamesRes.status} ${gamesRes.statusText}`, !gamesRes.ok);
        
        if (!gamesRes.ok) throw new Error("Failed to load games list.");
        
        const games = await gamesRes.json();
        games.forEach(app => {
          appNames[app.appid] = app.name;
        });
        log(`   -> Success! Loaded ${Object.keys(appNames).length} games.`);

        log("\n3. Building AppID to Depot mappings...");
        buildMapping();

      } catch (err) {
        log(`\n❌ SCRIPT HALTED: ${err.message}`, true);
      }
    }

    function buildMapping() {
      const MAX_DISTANCE = 100;
      const sortedAppids = Object.keys(appNames).map(Number).sort((a, b) => a - b);
      const raw = {};

      Object.keys(depotKeys).forEach(depotStr => {
        const depotId = parseInt(depotStr);
        let left = 0, right = sortedAppids.length - 1;
        while (left <= right) {
          const mid = Math.floor((left + right) / 2);
          if (sortedAppids[mid] < depotId) left = mid + 1;
          else right = mid - 1;
        }
        if (left < sortedAppids.length) {
          const appId = sortedAppids[left];
          if (appId - depotId <= MAX_DISTANCE && appId >= depotId) {
            if (!raw[appId]) raw[appId] = new Set();
            raw[appId].add(depotId);
          }
        }
        if (right >= 0) {
          const appId = sortedAppids[right];
          if (depotId - appId <= MAX_DISTANCE && depotId >= appId) {
            if (!raw[appId]) raw[appId] = new Set();
            raw[appId].add(depotId);
          }
        }
      });

      Object.keys(raw).forEach(appIdStr => {
        const appId = parseInt(appIdStr);
        if (appNames[appId]) {
          appDepots[appId] = Array.from(raw[appId]).sort((a, b) => a - b);
        }
      });

      searchable = Object.keys(appDepots).map(appId => ({
        appId: appId,
        name: appNames[appId],
        nameLower: appNames[appId].toLowerCase()
      }));

      log(`\n✅ READY! Built mappings for ${searchable.length} supported games.`);
      searchInput.disabled = false;
      searchInput.focus();
    }

    searchInput.addEventListener('input', (e) => {
      const query = e.target.value.toLowerCase().trim();
      resultsEl.innerHTML = '';
      if (query.length < 2) return;

      let count = 0;
      for (const item of searchable) {
        if (item.nameLower.includes(query) || item.appId.toString().includes(query)) {
          const depots = appDepots[item.appId] || [];
          
          const div = document.createElement('div');
          div.className = 'result';
          div.innerHTML = `
            <strong>${item.name}</strong> (AppID: ${item.appId})
            <div class="depots">Found ${depots.length} depot(s): ${depots.join(', ')}</div>
          `;
          resultsEl.appendChild(div);
          
          count++;
          if (count >= 20) break;
        }
      }

      if (count === 0) {
        resultsEl.innerHTML = '<div class="result" style="text-align:center; color:#888;">No games found matching that search.</div>';
      }
    });

    loadData();
  </script>
</body>
</html>
